<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Web Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- WebGL Canvas will be injected here -->
    </div>

    <!-- UI Overlay Layer -->
    <div id="ui-layer">
        <!-- Main HUD -->
        <div id="hud" class="hidden">
            <div id="crosshair">+</div>
            <div id="stats-container">
                <div id="health-bar" class="stat-bar">
                    <!-- Hearts -->
                </div>
                <div id="hunger-bar" class="stat-bar">
                    <!-- Shanks -->
                </div>
            </div>
            <div id="hotbar-container">
                <div class="hotbar-slots">
                    <!-- 9 Hotbar Slots -->
                </div>
            </div>
            <div id="chat-container">
                <div id="chat-history"></div>
                <input type="text" id="chat-input" placeholder="Press T to chat..." style="display: none;" />
            </div>
        </div>

        <!-- Inventory & Crafting UI -->
        <div id="inventory-screen" class="hidden fullscreen-modal">
            <div class="modal-content">
                <h2>Inventory & Crafting</h2>
                <div class="inventory-layout">
                    <!-- Crafting 2x2 or 3x3 -->
                    <div id="crafting-section">
                        <h3>Crafting</h3>
                        <div id="crafting-grid" class="grid-2x2"></div>
                        <div class="crafting-arrow">➔</div>
                        <div id="crafting-output" class="slot"></div>
                    </div>
                    <!-- Main 27 slots + 9 hotbar -->
                    <div id="inventory-grid" class="grid-9x3"></div>
                    <div id="inventory-hotbar" class="grid-9x1"></div>
                </div>
            </div>
        </div>

        <!-- Mobile Controls Overlay -->
        <div id="mobile-controls" class="hidden">
            <div id="joystick-zone"></div>
            <div id="action-buttons">
                <button id="btn-jump">Jump</button>
                <button id="btn-sneak">Sneak</button>
                <button id="btn-mode">Mode: Build</button>
            </div>
        </div>

        <!-- Start / Settings Screen -->
        <div id="start-screen" class="fullscreen-modal">
            <div class="menu-container">
                <h1>Minecraft Clone</h1>
                <button id="btn-play" class="btn-primary">Play</button>
                <button id="btn-settings" class="btn-secondary">Settings</button>
            </div>
        </div>

        <div id="settings-screen" class="hidden fullscreen-modal">
            <div class="menu-container">
                <h2>Settings</h2>
                <div class="setting-row">
                    <label>Render Distance (Chunks): <span id="val-render-dist">8</span></label>
                    <input type="range" id="setting-render-dist" min="4" max="16" step="2" value="8">
                </div>
                <div class="setting-row">
                    <label>FOV: <span id="val-fov">75</span></label>
                    <input type="range" id="setting-fov" min="60" max="110" step="5" value="75">
                </div>
                <div class="setting-row">
                    <label>Master Volume: <span id="val-volume">100%</span></label>
                    <input type="range" id="setting-volume" min="0" max="100" value="100">
                </div>
                <button id="btn-close-settings" class="btn-primary">Back</button>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
